services:
  redis:
    ports:
      - "127.0.0.1:6379:6379"
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
  app:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      - KINGPI_REDIS_URL=redis://redis:6379/0
      - KINGPI_DATABASE_URL=postgresql+asyncpg://kingpi:kingpi@postgres:5432/kingpi
      - KINGPI_STORAGE_BACKEND=postgres
      - KINGPI_DEBUG=true
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
