services:
  app:
    build:
      context: .
      target: prod
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - KINGPI_REDIS_URL=redis://redis:6379/0
      # In production, supply DATABASE_URL via .env.prod (gitignored) or secrets manager.
      - KINGPI_DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://kingpi:kingpi@postgres:5432/kingpi}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
